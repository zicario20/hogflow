name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Python quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check --no-cache .

      - name: Ruff formatting
        run: python -m ruff format --check --no-cache .

      - name: Test synthetic and source-only suite
        run: python -m pytest

      - name: Compile package
        run: python -m compileall -q src

      - name: Verify installed dependencies
        run: python -m pip check
